<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    </head>
    <body>
         <script src="index.js"></script>
        <header class="container">
            <img src="images/logo.png" id="logo">
            <img src="/images/user-avatar.png" id="user-avatar">
        </header>
        <section class="container" id="post-title">
            <img src="/images/avatar-vangogh.jpg" class="profile-pic">
            <div id="post-info">
            <p class="user-name">Vincent van Gogh</p>
            <p class="location">Zudert, Netherlands</p>
             </div>
        </section>
        <post class="container">
            <div>
            <img src="/images/post-vangogh.jpg" class="post-pic">
            </div>
        </post>
        <post-footer class="container">
            <div id="icon-row">
                <img src="/images/icon-heart.png" class="icons">
                <img src="/images/icon-comment.png" class="icons">
                <img src="/images/icon-dm.png" class="icons">
            </div>
            <div class="metrics">
                <p><strong>21,429 likes</strong></p>
                <p><strong>vincey1853</strong> just took a few mushrooms, lol</p>
            </div>
        </post-footer>
    </body>
</html>
